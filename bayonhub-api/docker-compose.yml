version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: bayonhub-postgres
    environment:
      POSTGRES_USER: bayonhub
      POSTGRES_PASSWORD: bayonhub_dev
      POSTGRES_DB: bayonhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bayonhub-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:

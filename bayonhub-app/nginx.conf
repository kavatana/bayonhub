events { worker_connections 1024; }
http {
  include mime.types;
  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    location / {
      try_files $uri $uri/ /index.html;
    }
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
